<!--
  Datei:    Währungsrechner/index.html
  Zweck:    Tool-Seite für die Währungsumrechnung (CHF, EUR, USD).
            Eingabefelder und Wechselkurs-Tabelle sind statisch definiert,
            Werte werden per app.js dynamisch befüllt.
  Scripts:  base/tools.js → base/app.js (Sidebar + Hamburger) → app.js (Rechner-Logik)
-->
<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Währungsrechner</title>
    <link rel="stylesheet" href="../base/style.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="has-aside">
    <header>
      <h1>Colasit Webtools Bereich Einkauf</h1>
      <!-- Hamburger-Button — auf Desktop unsichtbar, auf Mobile eingeblendet -->
      <button id="menu-toggle" aria-label="Navigation öffnen">&#9776;</button>
    </header>
    <main>
      <div class="converter-card">
        <h2>Währungsrechner</h2>
        <!-- Fehlermeldung bei API-Ausfall (befüllt per app.js) -->
        <p id="error-msg" class="error-msg"></p>

        <!-- Eingabefelder: Änderung in einem Feld rechnet die anderen automatisch um -->
        <div class="currency-inputs">
          <div class="currency-row">
            <label for="input-CHF">Schweizer Franken (CHF)</label>
            <input
              type="number"
              id="input-CHF"
              placeholder="0.00"
              min="0"
              step="0.01"
            />
          </div>
          <div class="currency-row">
            <label for="input-EUR">Euro (EUR)</label>
            <input
              type="number"
              id="input-EUR"
              placeholder="0.00"
              min="0"
              step="0.01"
            />
          </div>
          <div class="currency-row">
            <label for="input-USD">US-Dollar (USD)</label>
            <input
              type="number"
              id="input-USD"
              placeholder="0.00"
              min="0"
              step="0.01"
            />
          </div>
        </div>

        <!-- Wechselkurs-Tabelle: alle 6 Richtungen, befüllt per app.js -->
        <div class="rates-info">
          <p class="rates-title">
            Aktuelle Wechselkurse <span id="rate-date"></span>
          </p>
          <table class="rates-table">
            <thead>
              <tr><th></th><th>CHF</th><th>EUR</th><th>USD</th></tr>
            </thead>
            <tbody>
              <tr>
                <th>1 CHF =</th>
                <td>—</td>
                <td><span id="rate-chf-eur">…</span></td>
                <td><span id="rate-chf-usd">…</span></td>
              </tr>
              <tr>
                <th>1 EUR =</th>
                <td><span id="rate-eur-chf">…</span></td>
                <td>—</td>
                <td><span id="rate-eur-usd">…</span></td>
              </tr>
              <tr>
                <th>1 USD =</th>
                <td><span id="rate-usd-chf">…</span></td>
                <td><span id="rate-usd-eur">…</span></td>
                <td>—</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
    <aside>
      <!-- Wird dynamisch von base/app.js aus base/tools.js befüllt -->
    </aside>
    <footer>
      <p>Colasit AG©</p>
      <ul>
        <li><a href="#">Impressum</a></li>
        <li><a href="#">Teams</a></li>
        <li><a href="#">Synonet</a></li>
        <li><a href="#">Ablage</a></li>
      </ul>
    </footer>
    <script src="../base/tools.js"></script>
    <script src="../base/app.js"></script>
    <script src="app.js"></script>
  </body>
</html>
