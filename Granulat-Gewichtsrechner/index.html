<!--
  Datei:    Granulat-Gewichtsrechner/index.html
  Zweck:    Tool-Seite zur Berechnung des Granulat-Bedarfs pro
            Produkt-Grösse-Material-Kombination.
            Desktop: Tabelle mit allen Kombinationen.
            Mobile:  Card-UI (Eingabe + Übersicht) mit gemeinsamem State.
  Scripts:  base/tools.js → base/app.js (Sidebar + Hamburger) → app.js (Rechner-Logik)
-->
<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Granulat Gewichtsrechner</title>
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../base/style.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="has-aside">
    <noscript>
      <div style="padding:1rem;background:#c62828;color:#fff;text-align:center;font-family:sans-serif;">
        Diese App benötigt JavaScript. Bitte aktivieren Sie JavaScript in Ihrem Browser.
      </div>
    </noscript>
    <header>
      <h1>Colasit Webtools Bereich Einkauf</h1>
      <!-- Hamburger-Button — auf Desktop unsichtbar, auf Mobile eingeblendet -->
      <button id="menu-toggle" aria-label="Navigation öffnen">&#9776;</button>
    </header>
    <main>
      <!-- tool-card--granulat: Modifier-Klasse für mobile Anpassungen ohne
           die globale .tool-card-Regel anderer Tools zu verändern -->
      <div class="tool-card tool-card--granulat">
        <h2>Granulat Gewichtsrechner</h2>

        <!-- Fehlermeldung bei JSON-Ladefehler (befüllt per app.js) -->
        <p id="error-msg" class="error-msg"></p>

        <!-- Ladeanzeige (per app.js ausgeblendet, sobald Daten bereit) -->
        <p id="loading-msg" class="loading-msg">Daten werden geladen…</p>

        <!-- Haupt-Inhalt: per app.js eingeblendet nach dem Laden -->
        <div id="content-wrapper" hidden>

          <!-- ═══ DESKTOP-ANSICHT (≥ 768px): klassische Tabelle ═══ -->
          <div id="desktop-view">

            <div class="table-scroll">
              <table class="data-table" id="granulat-table">
                <thead>
                  <tr>
                    <th>Produkt</th>
                    <th>Grösse</th>
                    <th>Material</th>
                    <th>Stückzahl</th>
                    <th>Gewicht&nbsp;/&nbsp;Stück&nbsp;(kg)</th>
                    <th>Granulat&nbsp;(kg)</th>
                  </tr>
                </thead>
                <tbody id="table-body">
                  <!-- Wird dynamisch per app.js befüllt -->
                </tbody>
              </table>
            </div>

            <h3 class="totals-heading">Gesamtbedarf pro Material</h3>
            <div class="table-scroll table-scroll--narrow">
              <table class="data-table" id="totals-table">
                <thead>
                  <tr>
                    <th>Material</th>
                    <th>Gesamtbedarf&nbsp;(kg)</th>
                  </tr>
                </thead>
                <tbody id="totals-body">
                  <!-- Wird dynamisch per app.js befüllt -->
                </tbody>
              </table>
            </div>

            <!-- Ergebnis in die Zwischenablage kopieren (Word/Outlook-kompatibel) -->
            <button class="copy-btn" id="copy-btn-desktop" type="button" disabled>
              Ergebnis kopieren
            </button>

          </div><!-- /#desktop-view -->

          <!-- ═══ MOBILE-ANSICHT (< 768px): Card-UI ═══ -->
          <div id="mobile-view">

            <!-- Card 1: Eingabe-Formular -->
            <div class="m-card" id="m-card-input">
              <h3 class="m-card__title">Eingabe</h3>

              <div class="m-field">
                <label for="m-select-product">Produkt</label>
                <select id="m-select-product">
                  <!-- Befüllt per app.js aus granulat.json -->
                </select>
              </div>

              <div class="m-field">
                <label for="m-select-size">Grösse</label>
                <select id="m-select-size">
                  <!-- Befüllt per app.js abhängig vom gewählten Produkt -->
                </select>
              </div>

              <div class="m-field">
                <label for="m-select-material">Material</label>
                <select id="m-select-material">
                  <!-- Befüllt per app.js abhängig von Produkt + Grösse -->
                </select>
              </div>

              <div class="m-field">
                <label for="m-input-qty">Stückzahl</label>
                <input
                  type="number"
                  id="m-input-qty"
                  min="0"
                  step="1"
                  value="0"
                  inputmode="numeric"
                  aria-label="Stückzahl"
                />
              </div>

              <button class="m-btn" id="m-btn-confirm" type="button">
                Übernehmen
              </button>
            </div><!-- /#m-card-input -->

            <!-- Card 2: Übersicht bestätigter Einträge + Totale -->
            <div class="m-card" id="m-card-overview">
              <h3 class="m-card__title">Übersicht</h3>

              <ul class="m-entry-list" id="m-entry-list">
                <!-- Befüllt per app.js nach jeder State-Änderung -->
              </ul>

              <div class="m-totals" id="m-totals">
                <!-- Befüllt per app.js: eine Zeile pro Material mit Total > 0 -->
              </div>

              <!-- Ergebnis in die Zwischenablage kopieren (Word/Outlook-kompatibel) -->
              <button class="m-btn m-btn--copy" id="copy-btn-mobile" type="button" disabled>
                Ergebnis kopieren
              </button>
            </div><!-- /#m-card-overview -->

          </div><!-- /#mobile-view -->

        </div><!-- /#content-wrapper -->
      </div><!-- /.tool-card -->
    </main>
    <aside>
      <!-- Wird dynamisch von base/app.js aus base/tools.js befüllt -->
    </aside>
    <footer>
      <p>Colasit AG©</p>
      <ul>
        <li><a href="#">Impressum</a></li>
        <li><a href="#">Teams</a></li>
        <li><a href="#">Synonet</a></li>
        <li><a href="#">Ablage</a></li>
      </ul>
    </footer>
    <script src="../base/tools.js"></script>
    <script src="../base/app.js"></script>
    <script src="app.js"></script>
  </body>
</html>
